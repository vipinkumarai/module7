<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Document Content Extractor</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           max-width: 820px; margin: 40px auto; padding: 0 16px; color: #1b1b1b; }
    h1 { font-size: 1.5rem; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 20px; margin-top: 16px; }
    button { background: #0078d4; color: #fff; border: 0; border-radius: 6px;
             padding: 10px 18px; font-size: 1rem; cursor: pointer; }
    button:disabled { background: #9bbfe0; cursor: default; }
    #status { margin-top: 12px; color: #555; }
    pre { white-space: pre-wrap; word-wrap: break-word; background: #f6f8fa;
          border: 1px solid #e1e4e8; border-radius: 6px; padding: 14px; max-height: 480px; overflow: auto; }
    .page-text { margin-top: 14px; }
    .page-text h3 { margin-bottom: 4px; font-size: 1rem; }
  </style>
</head>
<body>
  <h1>📄 Document Content Extractor</h1>
  <p>Upload a PDF (or image) and the Azure function will extract its text.</p>

  <div class="card">
    <input type="file" id="file" accept=".pdf,.jpg,.jpeg,.png,.tiff" />
    <button id="go">Extract content</button>
    <div id="status"></div>
  </div>

  <div id="results" class="card" style="display:none;">
    <h2>Extracted content</h2>
    <div id="meta"></div>
    <pre id="content"></pre>
    <div id="pages"></div>
  </div>

  <script>
    const fileInput = document.getElementById("file");
    const goBtn = document.getElementById("go");
    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results");
    const metaEl = document.getElementById("meta");
    const contentEl = document.getElementById("content");
    const pagesEl = document.getElementById("pages");

    goBtn.addEventListener("click", async () => {
      const file = fileInput.files[0];
      if (!file) { statusEl.textContent = "Please choose a file first."; return; }

      goBtn.disabled = true;
      statusEl.textContent = "Uploading and analyzing… this can take a few seconds.";
      resultsEl.style.display = "none";

      try {
        // POST the raw file bytes back to this same endpoint.
        const resp = await fetch(window.location.pathname, {
          method: "POST",
          headers: { "Content-Type": "application/octet-stream" },
          body: file,
        });

        if (!resp.ok) {
          statusEl.textContent = "Error: " + resp.status + " " + (await resp.text());
          return;
        }

        const data = await resp.json();
        statusEl.textContent = "Done.";
        metaEl.textContent = `Pages: ${data.page_count} · Words: ${data.keywords.length}`;
        contentEl.textContent = data.content || "(no text found)";

        pagesEl.innerHTML = "";
        (data.pages || []).forEach((p) => {
          const div = document.createElement("div");
          div.className = "page-text";
          const h = document.createElement("h3");
          h.textContent = "Page " + p.page_number;
          const pre = document.createElement("pre");
          pre.textContent = p.text || "(empty)";
          div.appendChild(h);
          div.appendChild(pre);
          pagesEl.appendChild(div);
        });

        resultsEl.style.display = "block";
      } catch (err) {
        statusEl.textContent = "Request failed: " + err;
      } finally {
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
